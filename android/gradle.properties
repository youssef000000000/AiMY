org.gradle.jvmargs=-Xmx4G
android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdk=35

# When true, debug APKs only include x86_64 (Android Emulator). Much smaller install (~1 ABI).
# Set to false when debugging on a physical ARM phone (armeabi-v7a / arm64-v8a).
android.debugEmuOnly=false
